<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍳 冷蔵庫レシピ</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #22263a;
    --border: #2e3350;
    --accent: #6c8aff;
    --accent2: #ff7f50;
    --green: #4caf82;
    --red: #e05c5c;
    --gold: #f5c842;
    --text: #e8eaf6;
    --muted: #8891b0;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* ---- Header (compressed to 1 line) ---- */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 640px;
    margin: 0 auto 20px;
  }
  .app-header h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -.3px; }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: .75rem;
    cursor: pointer;
    font-family: inherit;
    transition: border-color .15s, color .15s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  .app-footer {
    text-align: center;
    font-size: 9px;
    color: var(--border);
    padding-top: 20px;
    max-width: 640px;
    margin: 0 auto;
  }

  /* ---- Form card ---- */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 640px;
    margin: 0 auto 28px;
  }
  .form-label {
    font-size: .78rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 8px;
    display: block;
  }
  .form-group { margin-bottom: 18px; }

  /* Tag input */
  .tag-input-wrap {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    cursor: text;
    min-height: 48px;
    align-items: center;
  }
  .tag-input-wrap:focus-within { border-color: var(--accent); }
  .tag {
    background: var(--accent);
    color: #fff;
    font-size: .78rem;
    padding: 3px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .tag-del { cursor: pointer; opacity: .7; font-size: .85rem; line-height:1; }
  .tag-del:hover { opacity: 1; }
  #ingredient-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: .9rem;
    flex: 1;
    min-width: 120px;
  }
  .tag-hint { font-size: .72rem; color: var(--muted); margin-top: 5px; }

  input[type=text], input[type=number], select, textarea {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: .9rem;
    padding: 10px 12px;
    width: 100%;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus, input[type=number]:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }
  select option { background: var(--card2); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* Submit button */
  .btn-suggest {
    width: 100%;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    padding: 13px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    margin-top: 4px;
  }
  .btn-suggest:hover  { opacity: .88; }
  .btn-suggest:active { transform: scale(.98); }
  .btn-suggest:disabled { opacity: .45; cursor: not-allowed; }

  /* ---- Loading ---- */
  .loading {
    text-align: center;
    padding: 20px 0 10px;
    display: none;
    max-width: 640px;
    margin: 0 auto;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msg { text-align: center; color: var(--muted); font-size: .8rem; margin: 4px 0 14px; }

  /* ---- Error ---- */
  .error-box {
    background: rgba(224,92,92,.12);
    border: 1px solid var(--red);
    border-radius: var(--radius);
    padding: 14px 18px;
    max-width: 640px;
    margin: 0 auto 20px;
    color: var(--red);
    font-size: .88rem;
    display: none;
  }

  /* ---- Results ---- */
  #results { max-width: 640px; margin: 0 auto; }
  .results-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: .78rem;
    color: var(--muted);
  }
  .btn-retry {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: .8rem;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .btn-retry:hover { border-color: var(--accent); color: var(--accent); }
  .btn-retry:disabled { opacity: .4; cursor: not-allowed; }

  /* ---- Summary row (comparison view) ---- */
  .sum-label {
    font-size: .72rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .6px;
    margin-bottom: 8px;
  }
  .summary-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    margin-bottom: 20px;
  }
  .summary-row::-webkit-scrollbar { display: none; }
  .sum-card {
    flex: 0 0 78%;
    max-width: 300px;
    scroll-snap-align: start;
    cursor: pointer;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    transition: border-color .15s, box-shadow .15s;
  }
  .sum-card.current { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .sum-num { font-size: .68rem; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .sum-title { font-size: 1rem; font-weight: 800; margin-bottom: 6px; line-height: 1.3; }
  .sum-meta { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .sum-reason {
    font-size: .78rem;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .sum-pair { font-size: .75rem; color: var(--gold); }

  @media (min-width: 560px) {
    .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); overflow-x: visible; scroll-snap-type: none; }
    .sum-card { flex: none; max-width: none; }
  }

  /* ---- Skeleton loading ---- */
  .sk {
    background: linear-gradient(90deg, var(--card2) 25%, #2b3050 50%, var(--card2) 75%);
    background-size: 200% 100%;
    animation: shim 1.4s infinite;
    border-radius: 6px;
  }
  @keyframes shim { to { background-position: -200% 0; } }
  .sk-card { cursor: default; }

  /* Recipe card */
  .recipe-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 18px;
    overflow: hidden;
  }
  .recipe-card.current { border-color: var(--accent); }
  .recipe-header {
    background: var(--card2);
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }
  .recipe-num {
    font-size: .68rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .recipe-title {
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 2px;
  }
  .recipe-title-en { font-size: .78rem; color: var(--muted); margin-bottom: 8px; }
  .recipe-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .badge {
    font-size: .7rem;
    padding: 2px 9px;
    border-radius: 4px;
    font-weight: 600;
  }
  .badge-time  { background: rgba(108,138,255,.15); color: var(--accent); }
  .badge-diff  { background: rgba(76,175,130,.15);  color: var(--green); }
  .badge-diff.hard { background: rgba(224,92,92,.15); color: var(--red); }

  .recipe-body { padding: 16px 18px; }
  .section-title {
    font-size: .72rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin: 14px 0 8px;
  }
  .section-title:first-child { margin-top: 0; }

  .reason-box {
    background: var(--card2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: .82rem;
    line-height: 1.6;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ---- Accordion detail sections ---- */
  details.acc {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  details.acc summary {
    list-style: none;
    cursor: pointer;
    padding: 12px 14px;
    font-size: .85rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card2);
  }
  details.acc summary::-webkit-details-marker { display: none; }
  details.acc summary .arrow { margin-left: auto; color: var(--muted); transition: transform .2s; font-size: .8rem; }
  details.acc[open] summary .arrow { transform: rotate(180deg); }
  details.acc .d-body { padding: 12px 14px; }

  .ingredients-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .ing-chip {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: .78rem;
    padding: 3px 10px;
    color: var(--text);
  }

  /* ---- Ingredient substitution chips ---- */
  .chip-sub {
    background: rgba(224,92,92,.1);
    border: 1px dashed var(--red);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: .78rem;
    cursor: pointer;
    color: var(--text);
    font-family: inherit;
    text-align: left;
  }
  .chip-sub--selected {
    background: rgba(108,138,255,.18);
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .chip-sub-note { color: var(--red); font-size: .65rem; }
  .chip-sub--selected .chip-sub-note { color: var(--accent); font-size: .72rem; }
  .chip-sub-orig { text-decoration: line-through; color: var(--muted); font-size: .72rem; }

  /* ---- Suggested addition chips ---- */
  .chip-add {
    background: var(--card2);
    border: 1px dashed var(--accent);
    color: var(--accent);
    font-size: .78rem;
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: background .15s, border-color .15s, color .15s;
  }
  .chip-add:hover { background: rgba(108,138,255,.15); }
  .chip-add--selected {
    border-color: var(--green);
    border-style: solid;
    color: var(--green);
    background: rgba(76,175,130,.12);
  }
  .chip-add-reason { display: block; font-size: .65rem; color: var(--muted); margin-top: 1px; }

  .steps-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .steps-list li {
    display: flex;
    gap: 10px;
    font-size: .87rem;
    line-height: 1.55;
  }
  .step-num {
    background: var(--accent);
    color: #fff;
    font-size: .7rem;
    font-weight: 700;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .pairing-box {
    background: rgba(245,200,66,.07);
    border: 1px solid rgba(245,200,66,.25);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .pairing-icon { font-size: 1.3rem; flex-shrink: 0; }
  .pairing-drink { font-size: .9rem; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
  .pairing-reason { font-size: .8rem; color: var(--muted); }

  /* ---- Rewrite bar ---- */
  .rewrite-bar-wrap { margin-top: 4px; margin-bottom: 10px; }
  .btn-rewrite {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-rewrite--chat { background: var(--green); font-size: .85rem; }

  /* ---- Substitution modal ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 20px 20px 32px;
    width: 100%;
    max-width: 640px;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity:0 } to { transform: translateY(0); opacity:1 } }
  .modal-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; }
  .modal-ing   { font-size: 1rem; font-weight: 800; margin-bottom: 16px; }
  .modal-opts  { display: flex; flex-direction: column; gap: 8px; }
  .modal-opt {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: border-color .15s;
  }
  .modal-opt:hover { border-color: var(--accent); }
  .modal-opt.selected { border-color: var(--accent); background: rgba(108,138,255,.1); }
  .modal-opt-label { font-size: .72rem; font-weight: 700; color: var(--muted); margin-bottom: 2px; }
  .modal-opt-text  { font-size: .88rem; color: var(--text); }
  .modal-opt-note  { font-size: .75rem; color: var(--muted); margin-top: 3px; }
  .modal-close { margin-top: 14px; width: 100%; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 10px; cursor: pointer; font-size: .85rem; }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: var(--card2);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: .82rem;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 24px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* ---- Timer ---- */
  .timer-btn {
    background: rgba(108,138,255,.15);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: .72rem;
    padding: 2px 9px;
    border-radius: 12px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s;
  }
  .timer-btn:hover { background: rgba(108,138,255,.3); }
  .timer-display {
    font-size: .82rem;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    min-width: 38px;
    text-align: right;
  }
  .timer-done { color: var(--green); }

  /* ---- Chat ---- */
  .chat-section {
    border-top: 1px solid var(--border);
    padding: 14px 18px 16px;
    background: var(--bg);
  }
  .chat-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: .78rem;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: border-color .15s, color .15s;
  }
  .chat-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .chat-body { display: none; margin-top: 12px; }
  .chat-body.open { display: block; }
  .chat-messages {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 280px;
    overflow-y: auto;
    margin-bottom: 10px;
    padding-right: 2px;
  }
  .msg {
    font-size: .84rem;
    line-height: 1.55;
    padding: 8px 12px;
    border-radius: 8px;
    max-width: 88%;
  }
  .msg-user {
    background: var(--accent);
    color: #fff;
    align-self: flex-end;
    border-radius: 8px 8px 2px 8px;
  }
  .msg-ai {
    background: var(--card2);
    color: var(--text);
    align-self: flex-start;
    border-radius: 8px 8px 8px 2px;
    border: 1px solid var(--border);
  }
  .msg-thinking {
    background: var(--card2);
    color: var(--muted);
    align-self: flex-start;
    border-radius: 8px 8px 8px 2px;
    font-size: .78rem;
    font-style: italic;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  .chat-input-row {
    display: flex;
    gap: 8px;
  }
  .chat-input {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: .85rem;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-send {
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: .85rem;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
  }
  .chat-send:hover { opacity: .85; }
  .chat-send:disabled { opacity: .4; cursor: not-allowed; }

  /* ---- Copy button ---- */
  .btn-copy {
    position: absolute;
    top: 14px;
    right: 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: .75rem;
    padding: 6px 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
    min-width: 86px;
    text-align: center;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-copy:hover { color: var(--accent); border-color: var(--accent); }
  .btn-copy:active { transform: scale(.96); }

  /* ---- Kept dishes (tabs / history) ---- */
  .kept-tabs-wrap {
    max-width: 640px;
    margin: 0 auto 22px;
  }
  .kept-tabs-label {
    font-size: .72rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 8px;
  }
  .kept-tabs { display: flex; flex-wrap: wrap; gap: 8px; }
  .kept-tab {
    background: rgba(76,175,130,.12);
    border: 1px solid var(--green);
    color: var(--green);
    font-size: .82rem;
    font-weight: 600;
    padding: 6px 10px 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background .15s;
  }
  .kept-tab:hover { background: rgba(76,175,130,.22); }
  .kept-tab-del {
    opacity: .6;
    font-size: .78rem;
    line-height: 1;
    padding: 2px;
  }
  .kept-tab-del:hover { opacity: 1; }

  /* ---- Keep button (bottom of detail card) ---- */
  .keep-bar { padding: 14px 18px 18px; border-top: 1px solid var(--border); }
  .btn-keep {
    width: 100%;
    height: 52px;
    background: rgba(76,175,130,.12);
    border: 1px solid var(--green);
    color: var(--green);
    font-size: .95rem;
    font-weight: 800;
    border-radius: 12px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-keep:hover { background: rgba(76,175,130,.22); }
  .btn-keep.is-kept { opacity: .55; cursor: default; }
</style>
</head>
<body>

<header class="app-header">
  <h1>🍳 冷蔵庫レシピ</h1>
  <button class="btn-reset" onclick="resetAll()">🗑 リセット</button>
</header>

<!-- Kept dishes (tabs) -->
<div class="kept-tabs-wrap" id="kept-tabs-wrap" style="display:none">
  <div class="kept-tabs-label">✅ 決定した献立</div>
  <div class="kept-tabs" id="kept-tabs"></div>
</div>

<!-- Form -->
<div class="form-card">
  <div class="form-group">
    <label class="form-label">冷蔵庫の食材</label>
    <div class="tag-input-wrap" id="tag-wrap">
      <input type="text" id="ingredient-input" placeholder="例: 鶏肉、にんじん…（Enterで追加）">
    </div>

  <div class="form-group">

  <div class="modal-sheet">

</div>

<!-- Kept dish detail modal -->
<div class="modal-overlay" id="kept-modal" onclick="closeKeptModalBg(event)">
  <div class="modal-sheet" style="max-height:82vh;overflow-y:auto">
    <div class="modal-title">決定した献立</div>
    <div id="kept-modal-body"></div>
    <button class="modal-close" onclick="closeKeptModal()">閉じる</button>
  </div>
</div>

<div class="error-box" id="error-box"></div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">✨ 食材の組み合わせを考えています…</div>
  <div class="summary-row" id="skeleton-row">
    <div class="sum-card sk-card">
      <div class="sk" style="height:12px;width:36%;margin-bottom:10px"></div>
      <div class="sk" style="height:20px;width:85%;margin-bottom:10px"></div>
      <div class="sk" style="height:12px;width:95%;margin-bottom:6px"></div>
      <div class="sk" style="height:12px;width:70%"></div>
    </div>
    <div class="sum-card sk-card">
      <div class="sk" style="height:12px;width:36%;margin-bottom:10px"></div>
      <div class="sk" style="height:20px;width:70%;margin-bottom:10px"></div>
      <div class="sk" style="height:12px;width:95%;margin-bottom:6px"></div>
      <div class="sk" style="height:12px;width:60%"></div>
    </div>
    <div class="sum-card sk-card">
      <div class="sk" style="height:12px;width:36%;margin-bottom:10px"></div>
      <div class="sk" style="height:20px;width:78%;margin-bottom:10px"></div>
      <div class="sk" style="height:12px;width:95%;margin-bottom:6px"></div>
      <div class="sk" style="height:12px;width:65%"></div>
    </div>
  </div>
</div>

<!-- Results -->
<div id="results"></div>

<footer class="app-footer">
  <p id="deploy-info"></p>
</footer>

<script>

  // ---- SSE parse helper ----
  function parseSse(text, onSuccess) {
    var parts = text.split('\n\n');
    for (var i = 0; i < parts.length; i++) {
      var line = parts[i].trim();
      if (!line.startsWith('data: ')) continue;
      try {
        var d = JSON.parse(line.slice(6));
        if (d.error) { setLoading(false); showError(d.error); return true; }
        if (d.done)  { setLoading(false); try { onSuccess(d); } catch(re) { console.error('[RecipeApp] render error:', re); showError('表示エラー: ' + re.message); } return true; }
      } catch(e) { console.error('[RecipeApp] JSON parse error:', e, line.slice(0, 80)); }
    }
    return false;
  }

  // ---- Streaming fetch helper ----
  function readRecipeStream(url, body, onSuccess) {
    fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    }).then(function(response) {
      if (!response.ok) {
        return response.text().then(function(t) {
          setLoading(false);
          showError('サーバーエラー (' + response.status + ')');
          console.error('[RecipeApp] server error:', t.slice(0, 300));
        });
      }
      // Fallback: streaming not supported → read full text
      if (!response.body || !response.body.getReader) {
        return response.text().then(function(t) { parseSse(t, onSuccess); });
      }
      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var buf = '';
      function pump() {
        return reader.read().then(function(result) {
          if (result.done) {
            if (buf.trim()) parseSse(buf, onSuccess);
            setLoading(false);
            return;
          }
          buf += decoder.decode(result.value, {stream: true});
          var parts = buf.split('\n\n');
          buf = parts.pop();
          var found = parseSse(parts.join('\n\n'), onSuccess);
          if (!found) return pump();
        });
      }
      return pump();
    }).catch(function(e) {
      setLoading(false);
      console.error('[RecipeApp] fetch error:', e);
      showError('通信エラーが発生しました: ' + e.message);
    });
  }

  // ---- Deploy info ----
  fetch('/api/version').then(function(r){ return r.json(); }).then(function(d){
    document.getElementById('deploy-info').textContent = 'deployed: ' + d.deployed_at;
  });

  // ---- Kept dishes (persisted across reloads) ----
  var LS_HISTORY = 'recipe_history';
  var keptDishes = loadHistory();

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(LS_HISTORY)) || []; } catch(e) { return []; }
  }
  function saveHistoryList() {
    try { localStorage.setItem(LS_HISTORY, JSON.stringify(keptDishes)); } catch(e) {}
  }

  function renderKeptTabs() {
    var wrap = document.getElementById('kept-tabs-wrap');
    var el = document.getElementById('kept-tabs');
    if (!keptDishes.length) { wrap.style.display = 'none'; el.innerHTML = ''; return; }
    wrap.style.display = 'block';
    el.innerHTML = keptDishes.map(function(r) {
      return '<button class="kept-tab" onclick="openKeptModal(\'' + r._id + '\')">'
        + '🍽 ' + esc(r.title_ja)
        + '<span class="kept-tab-del" onclick="event.stopPropagation();removeKeptDish(\'' + r._id + '\')">✕</span>'
        + '</button>';
    }).join('');
  }

  function keepDish(idx) {
    var r = recipeData[idx];
    if (!r) return;
    var entry = JSON.parse(JSON.stringify(r));
    entry._id = Date.now() + '-' + idx;
    entry._keptAt = new Date().toLocaleString('ja-JP');
    keptDishes.push(entry);
    saveHistoryList();
    renderKeptTabs();
    showToast('✅ 「' + r.title_ja + '」を決定！次の献立を探せます');
    resetAll();
  }

  function openKeptModal(id) {
    var r = keptDishes.find(function(x){ return String(x._id) === String(id); });
    if (!r) return;
    document.getElementById('kept-modal-body').innerHTML = renderStaticRecipeCard(r);
    document.getElementById('kept-modal').classList.add('open');
  }
  function closeKeptModal() {
    document.getElementById('kept-modal').classList.remove('open');
  }
  function closeKeptModalBg(e) {
    if (e.target === document.getElementById('kept-modal')) closeKeptModal();
  }
  function removeKeptDish(id) {
    keptDishes = keptDishes.filter(function(x){ return String(x._id) !== String(id); });
    saveHistoryList();
    renderKeptTabs();
  }

  function renderStaticRecipeCard(r) {
    var ings = (r.ingredients_ja || []).map(function(ing) {
      return '<span class="ing-chip">' + esc(ing) + '</span>';
    }).join('');
    var steps = (r.steps_ja || []).map(function(s, si) {
      return '<li style="align-items:center"><span class="step-num">' + (si+1) + '</span><span style="flex:1">' + esc(s) + '</span></li>';
    }).join('');
    return '<div style="font-size:1.05rem;font-weight:800;margin-bottom:6px">' + esc(r.title_ja) + '</div>'
      + '<div class="recipe-badges" style="margin-bottom:10px">'
      + (r.cook_time_min ? '<span class="badge badge-time">⏱ ' + r.cook_time_min + '分</span>' : '')
      + (r.difficulty ? '<span class="badge badge-diff' + (r.difficulty === '難しい' ? ' hard' : '') + '">' + esc(r.difficulty) + '</span>' : '')
      + '</div>'
      + (r._keptAt ? '<div class="hint" style="margin-bottom:10px">決定日時: ' + esc(r._keptAt) + '</div>' : '')
      + (r.reason ? '<div class="section-title">選んだ理由</div><div class="reason-box">' + esc(r.reason) + '</div>' : '')
      + (ings ? '<div class="section-title">材料</div><div class="ingredients-grid">' + ings + '</div>' : '')
      + (steps ? '<div class="section-title">作り方</div><ul class="steps-list">' + steps + '</ul>' : '')
      + (r.tips && r.tips.length ? '<div class="section-title">コツ・ポイント</div>'
        + '<ul style="list-style:none;display:flex;flex-direction:column;gap:6px">'
        + r.tips.map(function(t){ return '<li style="font-size:.84rem;display:flex;gap:8px;line-height:1.5"><span style="color:var(--gold);flex-shrink:0">✦</span><span>' + esc(t) + '</span></li>'; }).join('')
        + '</ul>' : '')
      + (r.pairing ? '<div class="section-title">お酒のペアリング</div>'
        + '<div class="pairing-box"><div class="pairing-icon">🍷</div>'
        + '<div><div class="pairing-drink">' + esc(r.pairing.drink) + '</div>'
        + '<div class="pairing-reason">' + esc(r.pairing.reason) + '</div></div></div>' : '');
  }

  // ---- Restore previous session ----
  renderKeptTabs();
  restoreState();

  // ---- Tag input ----
  var tags = [];

  document.getElementById('ingredient-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      addTag(this.value.replace(/,/g,'').trim());
      this.value = '';
    }
  });

  document.getElementById('ingredient-input').addEventListener('blur', function() {
    var v = this.value.replace(/,/g,'').trim();
    if (v) { addTag(v); this.value = ''; }
  });

  document.getElementById('tag-wrap').addEventListener('click', function(e) {
    if (e.target === this || e.target.id === 'ingredient-input') {
      document.getElementById('ingredient-input').focus();
    }
  });

  function addTag(val) {
    if (!val || tags.includes(val)) return;
    tags.push(val);
    renderTags();
  }

  function removeTag(val) {
    tags = tags.filter(function(t){ return t !== val; });
    renderTags();
  }

  function renderTags() {
    var wrap = document.getElementById('tag-wrap');
    var input = document.getElementById('ingredient-input');
    // Remove old tags
    wrap.querySelectorAll('.tag').forEach(function(el){ el.remove(); });
    tags.forEach(function(t) {
      var el = document.createElement('div');
      el.className = 'tag';
      el.innerHTML = t + '<span class="tag-del" onclick="removeTag(\'' + t.replace(/'/g,"\\'") + '\')">✕</span>';
      wrap.insertBefore(el, input);
    });
  }

  // ---- API calls ----
  var lastIngredients = [];
  var lastMood = '';
  var lastServings = 2;
  var lastMaxTime = '';
  var lastDrink = '';
  var shownTitles = [];

  var loadingMsgs = [
    '✨ 食材の組み合わせを考えています…',
    '📝 レシピを書いています…',
    '🍷 ペアリングを選んでいます…',
  ];
  var msgIdx = 0;
  var msgTimer = null;

  function startLoadingMsgs() {
    msgIdx = 0;
    document.getElementById('loading-msg').textContent = loadingMsgs[0];
    msgTimer = setInterval(function() {
      msgIdx = (msgIdx + 1) % loadingMsgs.length;
      document.getElementById('loading-msg').textContent = loadingMsgs[msgIdx];
    }, 4000);
  }

  function stopLoadingMsgs() {
    clearInterval(msgTimer);
  }

  function setLoading(on) {
    document.getElementById('loading').style.display = on ? 'block' : 'none';
    document.getElementById('btn-suggest').disabled = on;
    var retryBtn = document.getElementById('btn-retry');
    if (retryBtn) retryBtn.disabled = on;
    if (on) startLoadingMsgs(); else stopLoadingMsgs();
  }

  function showError(msg) {
    var el = document.getElementById('error-box');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-box').style.display = 'none';
  }

  function pollJob(jobId, onSuccess) {
    fetch('/api/job/' + jobId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === 'pending') {
        setTimeout(function() { pollJob(jobId, onSuccess); }, 2000);
      } else if (data.status === 'done') {
        setLoading(false);
        onSuccess(data);
      } else {
        setLoading(false);
        showError(data.error || 'エラーが発生しました');
      }
    })
    .catch(function(e) {
      setLoading(false);
      showError('通信エラー: ' + e.message);
    });
  }

  function fetchRecipes(url, body, onSuccess) {
    fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { setLoading(false); showError(data.error); return; }
      if (data.job_id) { pollJob(data.job_id, onSuccess); return; }
      setLoading(false);
      onSuccess(data);
    })
    .catch(function(e) {
      setLoading(false);
      showError('通信エラー: ' + e.message);
    });
  }

  function suggest() {
    if (tags.length === 0) { showError('食材を1つ以上入力してください'); return; }
    hideError();
    lastIngredients = tags.slice();
    lastMood = document.getElementById('mood').value.trim();
    lastServings = parseInt(document.getElementById('servings').value);
    lastMaxTime = document.getElementById('max-time').value;
    lastDrink = document.getElementById('drink').value.trim();
    shownTitles = [];
    setLoading(true);
    document.getElementById('results').innerHTML = '';

    fetchRecipes('/api/recipe', {
      ingredients: lastIngredients, mood: lastMood,
      servings: lastServings, max_time: lastMaxTime, drink: lastDrink,
      exclude_titles: keptDishes.map(function(r){ return r.title_ja; })
    }, function(data) {
      shownTitles = data.recipes.map(function(r){ return r.title_ja; });
      renderResults(data);
    });
  }

  function retry() {
    hideError();
    setLoading(true);

    fetchRecipes('/api/recipe/next', {
      ingredients: lastIngredients, mood: lastMood,
      servings: lastServings, max_time: lastMaxTime,
      drink: lastDrink,
      exclude_titles: shownTitles.concat(keptDishes.map(function(r){ return r.title_ja; }))
    }, function(data) {
      shownTitles = shownTitles.concat(data.recipes.map(function(r){ return r.title_ja; }));
      renderResults(data);
    });
  }

  // ---- Render ----
  var recipeSubsMap = [];  // built subs dict per recipe index

  function renderResults(data) {
    if (data.recipes) recipeData = data.recipes;
    if (data.generated_at) lastGenAt = data.generated_at;
    if (data.candidate_count) lastCandCount = data.candidate_count;
    // Only reset chat/subs on fresh results
    if (data._fresh !== false) { chatHistories = {}; selectedSubs = {}; recipeSubsMap = []; }
    // Clear running timers before re-render
    Object.keys(activeTimers).forEach(function(id) {
      if (activeTimers[id] && activeTimers[id].interval) clearInterval(activeTimers[id].interval);
    });
    activeTimers = {};
    var el = document.getElementById('results');

    var diffClass = function(d) {
      return d === '難しい' ? 'badge-diff hard' : 'badge-diff';
    };

    var meta = '<div class="results-meta">'
      + '<span>' + data.candidate_count + '件のレシピから選出 · ' + data.generated_at + '</span>'
      + '<button class="btn-retry" id="btn-retry" onclick="retry()">🔄 別の提案を見る</button>'
      + '</div>';

    // ---- Summary row (compare-first view) ----
    var summaryHtml = '';
    if (data.recipes && data.recipes.length) {
      var sumCards = data.recipes.map(function(r, i) {
        return '<div class="sum-card" id="sum-card-' + i + '" onclick="scrollToRecipe(' + i + ')">'
          + '<div class="sum-num">レシピ ' + (i+1) + '</div>'
          + '<div class="sum-title">' + esc(r.title_ja) + '</div>'
          + '<div class="sum-meta">'
          + (r.cook_time_min ? '<span class="badge badge-time">⏱ ' + r.cook_time_min + '分</span>' : '')
          + (r.difficulty ? '<span class="badge ' + diffClass(r.difficulty) + '">' + esc(r.difficulty) + '</span>' : '')
          + '</div>'
          + (r.reason ? '<div class="sum-reason">' + esc(r.reason) + '</div>' : '')
          + (r.pairing ? '<div class="sum-pair">🍷 ' + esc(r.pairing.drink) + '</div>' : '')
          + '</div>';
      }).join('');
      summaryHtml = '<div class="sum-label">📊 ' + data.recipes.length + 'つの提案をくらべる（タップで詳細へ）</div>'
        + '<div class="summary-row" id="summary-row">' + sumCards + '</div>';
    }

    var cards = data.recipes.map(function(r, i) {
      var steps = (r.steps_ja || []).map(function(s, si) {
        var secs = parseStepTime(s);
        var tid = 'timer-' + i + '-' + si;
        var timerHtml = secs
          ? '<span class="timer-display" id="disp-' + tid + '"></span>'
            + '<button class="timer-btn" id="btn-' + tid + '" onclick="toggleTimer(\'' + tid + '\',' + secs + ')">⏱ ' + fmtTime(secs) + '</button>'
          : '';
        return '<li style="align-items:center">'
          + '<span class="step-num">' + (si+1) + '</span>'
          + '<span style="flex:1">' + esc(s) + '</span>'
          + timerHtml
          + '</li>';
      }).join('');

      // Build lookup dict from substitutions array: {ingredient_name: sub_obj}
      var subsArr = r.substitutions || [];
      var subs = {};
      subsArr.forEach(function(s){ if (s.ingredient_name) subs[s.ingredient_name] = s; });
      recipeSubsMap[i] = subs;

      var ings = (r.ingredients_ja || []).map(function(ing) {
        // Find matching substitution key (partial match on ingredient name)
        var subKey = Object.keys(subs).find(function(k){ return ing.indexOf(k) !== -1; });
        var sub = subKey ? subs[subKey] : null;
        var selSub = selectedSubs[i] && selectedSubs[i][subKey];
        if (sub) {
          var chipClass = 'chip-sub' + (selSub ? ' chip-sub--selected' : '');
          var label = selSub === '省略'
            ? '<span class="chip-sub-orig">' + esc(ing) + '</span> <span class="chip-sub-note">省略</span>'
            : selSub
              ? '<span class="chip-sub-orig">' + esc(ing) + '</span><span class="chip-sub-note"> → ' + esc(selSub) + '</span>'
              : esc(ing) + ' <span class="chip-sub-note">▼変更</span>';
          return '<button class="' + chipClass + '" onclick="openSubModal(' + i + ',\'' + esc(subKey).replace(/'/g,"\\'") + '\')">'
            + label + '</button>';
        }
        return '<span class="ing-chip">' + esc(ing) + '</span>';
      }).join('');

      var additionsHtml = (r.suggested_additions && r.suggested_additions.length)
        ? '<details class="acc"><summary>➕ 追加するともっと美味しくなる食材<span class="arrow">▾</span></summary>'
          + '<div class="d-body" style="display:flex;flex-wrap:wrap;gap:8px">'
          + r.suggested_additions.map(function(a) {
              return '<button class="chip-add" onclick="toggleAddition(' + i + ',\'' + esc(a.name_ja).replace(/'/g,"\\'") + '\',this)" '
                + 'title="' + esc(a.reason) + '">'
                + '＋ ' + esc(a.name_ja)
                + '<span class="chip-add-reason">' + esc(a.reason) + '</span>'
                + '</button>';
            }).join('')
          + '</div></details>'
        : '';

      var tipsHtml = (r.tips && r.tips.length)
        ? '<details class="acc"><summary>✦ コツ・ポイント<span class="arrow">▾</span></summary>'
          + '<div class="d-body"><ul style="list-style:none;display:flex;flex-direction:column;gap:6px">'
          + r.tips.map(function(t){ return '<li style="font-size:.84rem;display:flex;gap:8px;line-height:1.5"><span style="color:var(--gold);flex-shrink:0">✦</span><span>' + esc(t) + '</span></li>'; }).join('')
          + '</ul></div></details>'
        : '';

      var pairingHtml = r.pairing
        ? '<div class="pairing-box">'
          + '<div class="pairing-icon">🍷</div>'
          + '<div><div class="pairing-drink">' + esc(r.pairing.drink) + '</div>'
          + '<div class="pairing-reason">' + esc(r.pairing.reason) + '</div></div>'
          + '</div>'
        : '';

      var hasSubsOrAdds = (selectedSubs[i] && Object.keys(selectedSubs[i]).length > 0)
        || (selectedAdditions[i] && selectedAdditions[i].length > 0);

      return '<div class="recipe-card" id="recipe-card-' + i + '" data-idx="' + i + '">'
        + '<div class="recipe-header" style="position:relative">'
        + '<div class="recipe-num">レシピ ' + (i+1) + '</div>'
        + '<div class="recipe-title">' + esc(r.title_ja) + '</div>'
        + '<div class="recipe-badges">'
        + (r.cook_time_min ? '<span class="badge badge-time">⏱ ' + r.cook_time_min + '分</span>' : '')
        + (r.difficulty ? '<span class="badge ' + diffClass(r.difficulty) + '">' + esc(r.difficulty) + '</span>' : '')
        + '</div>'
        + '<button class="btn-copy" id="copy-btn-' + i + '" onclick="copyRecipe(' + i + ')">📋 コピー</button>'
        + '</div>'
        + '<div class="recipe-body">'
        + (r.reason ? '<div class="reason-box">' + esc(r.reason) + '</div>' : '')
        + (ings ? '<details class="acc" open><summary>🥕 材料（' + lastServings + '人前）<span class="arrow">▾</span></summary><div class="d-body ingredients-grid">' + ings + '</div></details>' : '')
        + (steps ? '<details class="acc" open><summary>👨‍🍳 作り方<span class="arrow">▾</span></summary><div class="d-body"><ul class="steps-list">' + steps + '</ul></div></details>' : '')
        + '<div id="rewrite-bar-' + i + '" class="rewrite-bar-wrap" style="display:' + (hasSubsOrAdds ? 'block' : 'none') + '">'
        + '<button class="btn-rewrite" onclick="applyRewrite(' + i + ')">✨ この変更でレシピを更新</button>'
        + '</div>'
        + additionsHtml
        + tipsHtml
        + pairingHtml
        + '</div>'
        + '<div class="chat-section">'
        + '<button class="chat-toggle" onclick="toggleChat(' + i + ')">💬 このレシピについて質問する</button>'
        + '<div class="chat-body" id="chat-body-' + i + '">'
        + '<div class="chat-messages" id="chat-msgs-' + i + '"></div>'
        + '<div class="chat-input-row">'
        + '<input class="chat-input" id="chat-input-' + i + '" type="text" placeholder="例: 代替食材は？ アレンジは？" '
        + 'onkeydown="if(event.key===\'Enter\')sendChat(' + i + ')">'
        + '<button class="chat-send" id="chat-send-' + i + '" onclick="sendChat(' + i + ')">送信</button>'
        + '</div>'
        + '<div id="chat-rewrite-bar-' + i + '" style="display:none;margin-top:10px">'
        + '<button class="btn-rewrite btn-rewrite--chat" onclick="applyRewriteFromChat(' + i + ')">'
        + '💬 この会話を踏まえてレシピを更新'
        + '</button>'
        + '</div>'
        + '</div>'
        + '</div>'
        + '<div class="keep-bar"><button class="btn-keep" onclick="keepDish(' + i + ')">✅ これに決めた（次の献立へ）</button></div>'
        + '</div>';
    }).join('');

    el.innerHTML = meta + summaryHtml + cards;
    saveState();
    setupCardObserver();
  }

  // ---- Summary <-> detail card sync ----
  var cardObserver = null;

  function scrollToRecipe(i) {
    var target = document.getElementById('recipe-card-' + i);
    if (!target) return;
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    highlightSummary(i);
  }

  function highlightSummary(i) {
    document.querySelectorAll('.sum-card').forEach(function(el){ el.classList.remove('current'); });
    document.querySelectorAll('.recipe-card').forEach(function(el){ el.classList.remove('current'); });
    var sc = document.getElementById('sum-card-' + i);
    var rc = document.getElementById('recipe-card-' + i);
    if (sc) sc.classList.add('current');
    if (rc) rc.classList.add('current');
  }

  function setupCardObserver() {
    if (cardObserver) { cardObserver.disconnect(); cardObserver = null; }
    var cards = document.querySelectorAll('.recipe-card');
    if (!cards.length || !('IntersectionObserver' in window)) return;
    cardObserver = new IntersectionObserver(function(entries) {
      var best = null;
      entries.forEach(function(entry) {
        if (entry.isIntersecting && (!best || entry.intersectionRatio > best.intersectionRatio)) {
          best = entry;
        }
      });
      if (best) {
        var idx = best.target.getAttribute('data-idx');
        highlightSummary(parseInt(idx, 10));
      }
    }, { threshold: [0, 0.25, 0.5, 0.75, 1] });
    cards.forEach(function(c){ cardObserver.observe(c); });
    highlightSummary(0);
  }

  // ---- State persistence ----
  function resetAll() {
    try { localStorage.removeItem('recipe_state'); } catch(e) {}
    tags = []; lastIngredients = []; lastMood = ''; lastServings = 2;
    lastMaxTime = ''; lastDrink = ''; shownTitles = [];
    recipeData = []; chatHistories = {}; selectedSubs = {}; recipeSubsMap = [];
    if (cardObserver) { cardObserver.disconnect(); cardObserver = null; }
    document.getElementById('mood').value = '';
    document.getElementById('servings').value = '2';
    document.getElementById('max-time').value = '';
    document.getElementById('drink').value = '';
    document.getElementById('results').innerHTML = '';
    hideError();
    // Clear tag chips
    var wrap = document.getElementById('tag-wrap');
    var input = document.getElementById('ingredient-input');
    Array.from(wrap.querySelectorAll('.tag')).forEach(function(el){ el.remove(); });
    input.value = '';
  }

  function saveState() {
    try {
      localStorage.setItem('recipe_state', JSON.stringify({
        recipes: recipeData,
        generated_at: lastGenAt,
        candidate_count: lastCandCount,
        tags: tags,
        mood: lastMood,
        servings: lastServings,
        max_time: lastMaxTime,
        drink: lastDrink,
        shownTitles: shownTitles,
      }));
    } catch(e) {}
  }

  function restoreState() {
    try {
      var raw = localStorage.getItem('recipe_state');
      if (!raw) return;
      var s = JSON.parse(raw);
      if (!s.recipes || !s.recipes.length) return;

      // Restore form
      lastIngredients = s.tags || [];
      tags = lastIngredients.slice();
      lastMood = s.mood || '';
      lastServings = s.servings || 2;
      lastMaxTime = s.max_time || '';
      lastDrink = s.drink || '';
      shownTitles = s.shownTitles || [];

      document.getElementById('mood').value = lastMood;
      document.getElementById('servings').value = lastServings;
      document.getElementById('max-time').value = lastMaxTime;
      document.getElementById('drink').value = lastDrink;

      // Restore tag chips
      var wrap = document.getElementById('tag-wrap');
      var input = document.getElementById('ingredient-input');
      tags.forEach(function(t) {
        var el = document.createElement('span');
        el.className = 'tag';
        el.innerHTML = t + '<span class="tag-del" onclick="removeTag(\'' + t.replace(/'/g,"\\'") + '\')">✕</span>';
        wrap.insertBefore(el, input);
      });

      // Restore recipes
      renderResults({ recipes: s.recipes, generated_at: s.generated_at, candidate_count: s.candidate_count, _fresh: false });
    } catch(e) {}
  }

  // ---- Substitution modal ----
  var selectedSubs = {};   // {recipeIdx: {ingredientKey: "alternative text" | "省略"}}
  var modalState = {};     // {recipeIdx, ingKey, sub}

  function openSubModal(recipeIdx, ingKey) {
    var subs = recipeSubsMap[recipeIdx] || {};
    var sub = subs[ingKey];
    if (!sub) return;
    modalState = {recipeIdx: recipeIdx, ingKey: ingKey, sub: sub};

    document.getElementById('modal-ing-name').textContent = ingKey;
    var current = (selectedSubs[recipeIdx] || {})[ingKey];

    var opts = '';
    // Original option
    opts += '<button class="modal-opt' + (!current ? ' selected' : '') + '" onclick="selectSub(null)">'
      + '<div class="modal-opt-label">そのまま使う</div>'
      + '<div class="modal-opt-text">変更なし</div>'
      + '</button>';
    // Alternative option
    if (sub.alternative) {
      opts += '<button class="modal-opt' + (current && current !== '省略' ? ' selected' : '') + '" onclick="selectSub(\'' + sub.alternative.replace(/'/g,"\\'") + '\')">'
        + '<div class="modal-opt-label">🔄 代替する</div>'
        + '<div class="modal-opt-text">' + esc(sub.alternative) + '</div>'
        + '</button>';
    }
    // Omit option
    if (sub.can_omit) {
      opts += '<button class="modal-opt' + (current === '省略' ? ' selected' : '') + '" onclick="selectSub(\'省略\')">'
        + '<div class="modal-opt-label">❌ 省略する</div>'
        + '<div class="modal-opt-text">このレシピから除外</div>'
        + (sub.omit_note ? '<div class="modal-opt-note">💡 ' + esc(sub.omit_note) + '</div>' : '')
        + '</button>';
    }
    document.getElementById('modal-opts').innerHTML = opts;
    document.getElementById('sub-modal').classList.add('open');
  }

  function selectSub(val) {
    var idx = modalState.recipeIdx;
    var key = modalState.ingKey;
    if (!selectedSubs[idx]) selectedSubs[idx] = {};
    if (val === null) {
      delete selectedSubs[idx][key];
    } else {
      selectedSubs[idx][key] = val;
    }
    closeSubModal();
    // Re-render results to reflect selection (keep chat/subs state)
    renderResults({recipes: recipeData, generated_at: lastGenAt, candidate_count: lastCandCount, _fresh: false});
    // Show/hide rewrite bar
    var bar = document.getElementById('rewrite-bar-' + idx);
    if (bar) {
      var hasSubs = selectedSubs[idx] && Object.keys(selectedSubs[idx]).length > 0;
      var hasAdds = selectedAdditions[idx] && selectedAdditions[idx].length > 0;
      bar.style.display = (hasSubs || hasAdds) ? 'block' : 'none';
    }
  }

  function closeSubModal() {
    document.getElementById('sub-modal').classList.remove('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('sub-modal')) closeSubModal();
  }

  var lastGenAt = '';
  var lastCandCount = 0;

  function applyRewrite(idx) {
    var recipe = recipeData[idx];
    var subs = selectedSubs[idx] || {};
    var adds = selectedAdditions[idx] || [];
    if (!Object.keys(subs).length && !adds.length) return;

    var btn = document.querySelector('#rewrite-bar-' + idx + ' button');
    if (btn) { btn.disabled = true; btn.textContent = '更新中…'; }

    fetch('/api/rewrite', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        recipe: recipe,
        selected_subs: subs,
        additions: adds,
        servings: lastServings,
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.error) { alert('エラー: ' + data.error); return; }
      var u = data.updated;
      if (u.ingredients_ja) recipeData[idx].ingredients_ja = u.ingredients_ja;
      if (u.steps_ja)       recipeData[idx].steps_ja       = u.steps_ja;
      if (u.tips)           recipeData[idx].tips           = u.tips;
      // Clear subs and re-render
      selectedSubs[idx] = {};
      selectedAdditions[idx] = [];
      renderResults({recipes: recipeData, generated_at: lastGenAt, candidate_count: lastCandCount, _fresh: false});
    })
    .catch(function(e) { alert('通信エラー: ' + e.message); })
    .finally(function() {
      if (btn) { btn.disabled = false; btn.textContent = '✨ この変更でレシピを更新'; }
    });
  }

  // ---- Toast ----
  var toastTimer = null;
  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2000);
  }

  // ---- Suggested ingredient (per-recipe addition) ----
  var selectedAdditions = {};  // {recipeIdx: [name, ...]}

  function toggleAddition(idx, name, btnEl) {
    if (!selectedAdditions[idx]) selectedAdditions[idx] = [];
    var arr = selectedAdditions[idx];
    var pos = arr.indexOf(name);
    if (pos === -1) {
      arr.push(name);
      if (btnEl) btnEl.classList.add('chip-add--selected');
      showToast('✓ ' + name + ' を選択');
    } else {
      arr.splice(pos, 1);
      if (btnEl) btnEl.classList.remove('chip-add--selected');
      showToast('✕ ' + name + ' の選択を解除');
    }
    // Show/hide addition rewrite bar
    var bar = document.getElementById('rewrite-bar-' + idx);
    if (bar) {
      var hasSubs = selectedSubs[idx] && Object.keys(selectedSubs[idx]).length > 0;
      var hasAdds = selectedAdditions[idx] && selectedAdditions[idx].length > 0;
      bar.style.display = (hasSubs || hasAdds) ? 'block' : 'none';
    }
  }

  // ---- Chat ----
  var chatHistories = {};  // {recipeIndex: [{role, content}]}
  var recipeData = [];     // store full recipe objects for context

  function toggleChat(idx) {
    var body = document.getElementById('chat-body-' + idx);
    body.classList.toggle('open');
  }

  function sendChat(idx) {
    var input = document.getElementById('chat-input-' + idx);
    var msg = input.value.trim();
    if (!msg) return;
    input.value = '';

    if (!chatHistories[idx]) chatHistories[idx] = [];

    appendMsg(idx, 'user', msg);
    var thinking = appendMsg(idx, 'thinking', '考え中…');

    document.getElementById('chat-send-' + idx).disabled = true;

    fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        recipe: recipeData[idx],
        history: chatHistories[idx].slice(),
        message: msg,
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      thinking.remove();
      document.getElementById('chat-send-' + idx).disabled = false;
      if (data.error) {
        appendMsg(idx, 'ai', '⚠ ' + data.error);
        return;
      }
      appendMsg(idx, 'ai', data.reply);
      chatHistories[idx].push({role: 'user', content: msg});
      chatHistories[idx].push({role: 'assistant', content: data.reply});
      // Show "apply chat to recipe" button after first AI reply
      var chatRewriteBar = document.getElementById('chat-rewrite-bar-' + idx);
      if (chatRewriteBar) chatRewriteBar.style.display = 'block';
    })
    .catch(function(e) {
      thinking.remove();
      document.getElementById('chat-send-' + idx).disabled = false;
      appendMsg(idx, 'ai', '⚠ 通信エラー: ' + e.message);
    });
  }

  function applyRewriteFromChat(idx) {
    var history = chatHistories[idx] || [];
    if (!history.length) return;
    var recipe = recipeData[idx];

    var bar = document.getElementById('chat-rewrite-bar-' + idx);
    var btn = bar ? bar.querySelector('button') : null;
    if (btn) { btn.disabled = true; btn.textContent = '更新中…'; }

    fetch('/api/rewrite-from-chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        recipe: recipe,
        chat_history: history,
        servings: lastServings,
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.error) { showToast('エラー: ' + data.error); return; }
      var u = data.updated;
      if (u.ingredients_ja) recipeData[idx].ingredients_ja = u.ingredients_ja;
      if (u.steps_ja)       recipeData[idx].steps_ja       = u.steps_ja;
      if (u.tips)           recipeData[idx].tips           = u.tips;
      chatHistories[idx] = [];
      renderResults({recipes: recipeData, generated_at: lastGenAt, candidate_count: lastCandCount, _fresh: false});
      showToast('✨ レシピを更新しました');
    })
    .catch(function(e) { showToast('通信エラー: ' + e.message); })
    .finally(function() {
      if (btn) { btn.disabled = false; btn.textContent = '💬 この会話を踏まえてレシピを更新'; }
    });
  }

  function appendMsg(idx, type, text) {
    var msgs = document.getElementById('chat-msgs-' + idx);
    var el = document.createElement('div');
    el.className = 'msg msg-' + type;
    el.textContent = text;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  // ---- Timer ----
  var activeTimers = {};

  function parseStepTime(text) {
    var m;
    m = text.match(/(\d+)分(\d+)秒/);
    if (m) return parseInt(m[1]) * 60 + parseInt(m[2]);
    m = text.match(/(\d+)[〜～](\d+)分/);
    if (m) return parseInt(m[2]) * 60;  // use larger value
    m = text.match(/(\d+)分/);
    if (m) { var mins = parseInt(m[1]); if (mins > 0 && mins <= 120) return mins * 60; }
    m = text.match(/(\d+)秒/);
    if (m) return parseInt(m[1]);
    return null;
  }

  function fmtTime(secs) {
    var m = Math.floor(secs / 60), s = secs % 60;
    return m > 0 ? (m + '分' + (s > 0 ? s + '秒' : '')) : s + '秒';
  }

  function fmtCountdown(secs) {
    var m = Math.floor(secs / 60), s = secs % 60;
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  function toggleTimer(tid, totalSecs) {
    var dispEl = document.getElementById('disp-' + tid);
    var btnEl  = document.getElementById('btn-' + tid);
    if (!dispEl || !btnEl) return;
    if (activeTimers[tid]) {
      if (activeTimers[tid].paused) {
        activeTimers[tid].paused = false;
        runTimer(tid);
        btnEl.textContent = '⏸';
      } else {
        clearInterval(activeTimers[tid].interval);
        activeTimers[tid].paused = true;
        btnEl.textContent = '▶ 再開';
      }
    } else {
      activeTimers[tid] = { remaining: totalSecs, paused: false, interval: null };
      dispEl.textContent = fmtCountdown(totalSecs);
      btnEl.textContent = '⏸';
      runTimer(tid);
    }
  }

  function runTimer(tid) {
    var state = activeTimers[tid];
    if (!state) return;
    state.interval = setInterval(function() {
      var dispEl = document.getElementById('disp-' + tid);
      var btnEl  = document.getElementById('btn-' + tid);
      if (!dispEl) { clearInterval(state.interval); return; }
      state.remaining--;
      if (state.remaining <= 0) {
        clearInterval(state.interval);
        delete activeTimers[tid];
        dispEl.textContent = '✅ 完了';
        dispEl.className = 'timer-display timer-done';
        if (btnEl) btnEl.style.display = 'none';
        beep();
      } else {
        dispEl.textContent = fmtCountdown(state.remaining);
      }
    }, 1000);
  }

  function beep() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.25, 0.5].forEach(function(t) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.2);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.2);
      });
    } catch(e) {}
  }

  // ---- Copy recipe to clipboard ----
  function copyRecipe(idx) {
    var r = recipeData[idx];
    if (!r) return;
    var lines = [];
    lines.push('【' + r.title_ja + '】');
    if (r.cook_time_min) lines.push('調理時間: ' + r.cook_time_min + '分');
    if (r.difficulty)    lines.push('難易度: ' + r.difficulty);
    if (r.ingredients_ja && r.ingredients_ja.length) {
      lines.push('');
      lines.push('■ 材料');
      r.ingredients_ja.forEach(function(ing) { lines.push('・' + ing); });
    }
    if (r.steps_ja && r.steps_ja.length) {
      lines.push('');
      lines.push('■ 作り方');
      r.steps_ja.forEach(function(s, si) { lines.push((si+1) + '. ' + s); });
    }
    if (r.tips && r.tips.length) {
      lines.push('');
      lines.push('■ コツ・ポイント');
      r.tips.forEach(function(t) { lines.push('・' + t); });
    }
    if (r.pairing) {
      lines.push('');
      lines.push('■ お酒のペアリング');
      lines.push(r.pairing.drink + ': ' + r.pairing.reason);
    }
    var text = lines.join('\n');

    function feedback() {
      var btn = document.getElementById('copy-btn-' + idx);
      if (!btn) return;
      var orig = btn.textContent;
      btn.textContent = 'コピーしました✓';
      btn.style.color = 'var(--green)';
      btn.style.borderColor = 'var(--green)';
      setTimeout(function() {
        btn.textContent = orig;
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 1500);
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(feedback).catch(function() { fallbackCopy(text); feedback(); });
    } else {
      fallbackCopy(text);
      feedback();
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  }

  function esc(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
</script>
