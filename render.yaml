services:
  - type: web
    name: recipe-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn recipe_server:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MODEL
        value: claude-haiku-4-5
